services:
  jekyll:
    image: ruby:4.0-slim
    working_dir: /site
    ports:
      - "4000:4000"
    volumes:
      - .:/site
      - bundle_cache:/usr/local/bundle
    environment:
      - JEKYLL_ENV=development
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y --no-install-recommends build-essential git &&
        bundle install &&
        bundle exec jekyll serve --host 0.0.0.0 --livereload --force_polling
      "

volumes:
  bundle_cache:
